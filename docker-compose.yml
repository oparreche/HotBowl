services:
  mysql:
    image: mysql:8.0
    container_name: hotbowl-mysql
    ports:
      - "3333:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hotbowl
      MYSQL_USER: hotbowl
      MYSQL_PASSWORD: hotbowl
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
volumes:
  mysql_data:
